name: 机器之心 GitHub 内容监控

# 触发条件：每周三北京时间12:00（UTC 4:00）+ 手动触发
on:
  schedule:
    - cron: '0 4 * * 3'        # ⚡ 关键！UTC 4点 = 北京时间12点，周3
  workflow_dispatch:            # 允许手动点"Run workflow"测试

jobs:
  monitor:
    runs-on: ubuntu-latest      # 在 GitHub 免费 Linux 服务器上跑

    steps:
      # 步骤1：拉取你的代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：安装 Python 环境
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 步骤3：安装依赖
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      # 步骤4：运行监控脚本
      - name: Run monitor script
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}  # 从 Secrets 读取
        run: |
          python monitor.py
